  <text x="56" y="452" class="node-name">5 invariants of merge_fact()</text>
  <text x="56" y="472" class="node-sub">1. pg_advisory_xact_lock(entity_id)               — serialises concurrent merges</text>
  <text x="56" y="488" class="node-sub">2. idempotency (source_doc_id, section, entity_id) — writes once</text>
  <text x="56" y="504" class="node-sub">3. confidence gate &lt; 0.6 → review_queue · 4. conflict detection · 5. transition log</text>
  <rect x="600" y="430" width="460" height="90" rx="6" fill="#F4F7FB" stroke="#8DA9C4" stroke-width="0.8"/>
  <text x="616" y="452" class="node-name">8 enterprise-object categories</text>
  <text x="616" y="472" class="node-sub">Doctrine · Capability · ActiveState · ActiveObligation · Risk</text>
  <text x="616" y="488" class="node-sub">ManagementDecision · CausalRelationship · EnterpriseTrajectory</text>
  <text x="616" y="504" class="footnote">Each = Pydantic model in src/schemas.py, inheriting FactBase (valid_from/until · confidence · source)</text>

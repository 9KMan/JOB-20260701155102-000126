  <!-- top-level + diagrams/ -->
  <g>
    <rect x="440" y="295" width="320" height="135" rx="6" fill="#f8fafc"/>
    <rect x="440" y="295" width="320" height="135" rx="6" fill="rgba(30,41,59,0.5)" stroke="#334155" stroke-width="1.5"/>
    <text x="460" y="320" class="dir-name">. (repo root)</text>

    <text x="460" y="343" class="file-name">README.md · SPEC.md · Dockerfile</text>
    <text x="460" y="357" class="file-name">docker-compose.yml · requirements.txt</text>
    <text x="460" y="371" class="file-name">pytest.ini · diagrams/architecture.svg</text>

    <text x="460" y="395" class="file-name">diagrams/</text>
    <text x="540" y="395" class="file-meta">architecture.svg · workflow.svg · project-structure.svg · file-layout.svg (this)</text>

    <text x="460" y="418" class="footnote">.planning/  (7 GSD phase PLAN files — gitignored from public release)</text>

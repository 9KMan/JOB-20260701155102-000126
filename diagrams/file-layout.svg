    <text x="160" y="141" class="file-meta">REQ-01</text>

    <rect x="60" y="155" width="340" height="22" rx="3" fill="rgba(251,113,133,0.18)" stroke="#fb7185" stroke-width="0.4"/>
    <text x="75" y="171" class="file-name" fill="#be123c">merge.py</text>
    <text x="160" y="171" class="file-meta">REQ-05..REQ-10 (the architectural invariant)</text>

    <rect x="60" y="185" width="340" height="22" rx="3" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="0.4"/>

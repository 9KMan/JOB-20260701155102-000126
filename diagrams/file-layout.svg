<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
    <style>
      .root       { font: 700 16px ui-monospace, "SF Mono", monospace; fill: #0f172a; }
      .dir-name   { font: 700 12px ui-monospace, "SF Mono", monospace; fill: #0f172a; }
      .file-name  { font: 11px ui-monospace, "SF Mono", monospace; fill: #1e293b; }
      .file-meta  { font: 10px ui-monospace, "SF Mono", monospace; fill: #94a3b8; }
      .footnote   { font: 10px ui-monospace, "SF Mono", monospace; fill: #64748b; }
    </style>
  </defs>

  <rect width="800" height="460" fill="#ffffff"/>
  <rect width="800" height="460" fill="url(#grid)"/>

  <text x="40" y="34" class="root">File layout (v1)</text>
  <text x="40" y="52" class="footnote">Persistent Reasoning Engine — SPEC §16 — REQ mappings preserved from the canonical source</text>

  <!-- src/ -->
  <g>
    <rect x="40" y="80" width="380" height="350" rx="6" fill="#f8fafc"/>
    <rect x="40" y="80" width="380" height="350" rx="6" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="60" y="108" class="dir-name" fill="#0e7490">src/</text>

    <rect x="60" y="125" width="340" height="22" rx="3" fill="rgba(251,113,133,0.18)" stroke="#fb7185" stroke-width="0.4"/>

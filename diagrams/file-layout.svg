    <text x="75" y="351" class="file-name">schema.sql</text>
    <text x="160" y="351" class="file-meta">REQ-03</text>
  </g>

  <!-- tests/ -->
  <g>
    <rect x="440" y="80" width="320" height="200" rx="6" fill="#f8fafc"/>
    <rect x="440" y="80" width="320" height="200" rx="6" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="460" y="108" class="dir-name" fill="#6d28d9">tests/</text>

    <text x="460" y="138" class="file-name">conftest.py</text>
